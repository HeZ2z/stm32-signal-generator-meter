name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

env:
  BUILD_TYPE: Release
  CCACHE_DIR: ~/.ccache

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Host Test Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ccache

      - name: Restore Ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-

      - name: Configure Host Tests
        run: >
          cmake -S tests -B build-host-tests -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build Host Tests
        run: cmake --build build-host-tests --config ${{ env.BUILD_TYPE }}

      - name: Run Host Tests
        run: ctest --test-dir build-host-tests --output-on-failure -C ${{ env.BUILD_TYPE }}

      - name: Install ARM Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi ccache

      - name: Configure Firmware
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-arm-none-eabi.cmake
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_ASM_COMPILER_LAUNCHER=ccache

      - name: Build Firmware
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Show Ccache Stats
        run: ccache --show-stats

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-artifacts
          path: |
            build/firmware.elf
            build/firmware.hex
            build/firmware.bin
            build/firmware.map
